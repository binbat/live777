name: quality

on:
  push:
  pull_request:

jobs:
  webui:
    runs-on: ubuntu-26.04
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      - name: Run Biome
        run: biome ci .

  format:
    runs-on: ubuntu-26.04
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Show version information
        run: |
          cargo --version
          cargo fmt --version

      - name: Cargo format
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-26.04
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Show version information
        run: |
          cargo --version
          cargo clippy --version
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential pkg-config \
            ffmpeg \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libswresample-dev \
            libswscale-dev \
            libcamera-dev \
            libv4l-dev \
            libvpx-dev \
            libx264-dev \
            libx265-dev \
            libsvtav1-dev \
            libopus-dev
      - name: FFmpeg diagnostics
        run: |
          which ffmpeg && ffmpeg -version | head -3
          pkg-config --modversion libavcodec libavutil libavdevice \
            libavfilter libavformat libswresample libswscale
          pkg-config --cflags --libs libavcodec
          clang --version || true
          find /usr/local /opt -name 'avformat.h' 2>/dev/null || true
      - name: Bindgen diagnostics
        run: |
          echo "LIBCLANG_PATH=$LIBCLANG_PATH"
          echo "CLANG_PATH=$CLANG_PATH"
          ldconfig -p | grep libclang || true
          dpkg -l | grep -E 'clang|llvm|libc6-dev|linux-libc-dev' || true
      - name: Prepare FFmpeg binding
        run: |
          cargo fetch
          BINDING=$(find "$HOME/.cargo/registry/src" -path '*rusty_ffmpeg-*/src/binding.rs' 2>/dev/null | head -1)
          echo "FFMPEG_BINDING_PATH=$BINDING"
          echo "FFMPEG_BINDING_PATH=$BINDING" >> "$GITHUB_ENV"
      - name: Cargo clippy --no-default-features
        run: cargo clippy --all-targets --no-default-features --workspace -- -D warnings
      - name: Cargo clippy default-features
        run: cargo clippy --all-targets --workspace -- -D warnings
      - name: Cargo clippy no webui
        run: cargo clippy --all-targets --features=net4mqtt,recorder,source-all --workspace -- -D warnings

      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm
      - name: Install npm dependencies
        run: pnpm install
      - name: Build WebUI
        run: pnpm -r build
      - name: Cargo clippy --all-features
        run: cargo clippy --all-targets --all-features --workspace -- -D warnings

