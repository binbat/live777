name: CI

on: [ push, pull_request ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-26.04 ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install FFmpeg development files (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Pin to a GyanD shared build so upstream updates don't break checksums.
          curl -fsSL -L -o /tmp/ffmpeg.7z \
            "https://github.com/GyanD/codexffmpeg/releases/download/8.1.2/ffmpeg-8.1.2-full_build-shared.7z"
          echo "cba748035c21ce1431d0823c7a3a711f38616f89f87a265dceddf9b7f6749d2d  /tmp/ffmpeg.7z" | sha256sum -c
          7z x /tmp/ffmpeg.7z -o/c/ffmpeg-tmp
          mv /c/ffmpeg-tmp/ffmpeg-8.1.2-full_build-shared /c/ffmpeg
          echo "$(cygpath -w /c/ffmpeg/bin)" >> "$GITHUB_PATH"
          echo "FFMPEG_INCLUDE_DIR=$(cygpath -w /c/ffmpeg/include)" >> "$GITHUB_ENV"
          echo "FFMPEG_LIBS_DIR=$(cygpath -w /c/ffmpeg/lib)" >> "$GITHUB_ENV"
          echo "FFMPEG_LINK_MODE=dynamic" >> "$GITHUB_ENV"
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg pkg-config
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"
      - name: Install FFmpeg development files (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential pkg-config \
            ffmpeg libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev libavdevice-dev libavfilter-dev
      - name: Show version information
        shell: bash
        run: |
          ffmpeg -version
          ffprobe -version
          if [ "$RUNNER_OS" != "Windows" ]; then
            pkg-config --modversion libavcodec libavutil libavdevice \
              libavfilter libavformat libswresample libswscale || true
          fi
      - name: Bindgen diagnostics
        if: runner.os == 'Linux'
        run: |
          echo "LIBCLANG_PATH=$LIBCLANG_PATH"
          echo "CLANG_PATH=$CLANG_PATH"
          ldconfig -p | grep libclang || true
          dpkg -l | grep -E 'clang|llvm|libc6-dev|linux-libc-dev' || true
      - name: Prepare FFmpeg binding
        shell: bash
        run: |
          cargo fetch
          BINDING=$(find "$HOME/.cargo/registry/src" -path '*rusty_ffmpeg-*/src/binding.rs' 2>/dev/null | head -1)
          if [ "$RUNNER_OS" == "Windows" ]; then
            BINDING=$(cygpath -w "$BINDING")
          fi
          echo "FFMPEG_BINDING_PATH=$BINDING"
          echo "FFMPEG_BINDING_PATH=$BINDING" >> "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm
      - name: Install npm dependencies
        run: pnpm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: .playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright
      - name: Build WebUI
        run: pnpm -r build

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Generate code coverage
        run: cargo llvm-cov nextest --profile ci --workspace --features source-all,webui,net4mqtt,recorder,cascade,rsmpeg,whepwright --lcov --output-path lcov.info
      - name: Upload coverage to codecov.io
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-26.04 ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm
      - name: Install npm dependencies
        run: pnpm install
      - name: Build WebUI
        run: pnpm -r build
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg pkg-config
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcamera-dev libv4l-dev

      - name: Install FFmpeg development files (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential pkg-config \
            ffmpeg libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev libavdevice-dev libavfilter-dev

      - name: Install FFmpeg development files (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Pin to a GyanD shared build so upstream updates don't break checksums.
          curl -fsSL -L -o /tmp/ffmpeg.7z \
            "https://github.com/GyanD/codexffmpeg/releases/download/8.1.2/ffmpeg-8.1.2-full_build-shared.7z"
          echo "cba748035c21ce1431d0823c7a3a711f38616f89f87a265dceddf9b7f6749d2d  /tmp/ffmpeg.7z" | sha256sum -c
          7z x /tmp/ffmpeg.7z -o/c/ffmpeg-tmp
          mv /c/ffmpeg-tmp/ffmpeg-8.1.2-full_build-shared /c/ffmpeg
          echo "$(cygpath -w /c/ffmpeg/bin)" >> "$GITHUB_PATH"
          echo "FFMPEG_INCLUDE_DIR=$(cygpath -w /c/ffmpeg/include)" >> "$GITHUB_ENV"
          echo "FFMPEG_LIBS_DIR=$(cygpath -w /c/ffmpeg/lib)" >> "$GITHUB_ENV"
          echo "FFMPEG_LINK_MODE=dynamic" >> "$GITHUB_ENV"

      - name: Show ffmpeg version
        shell: bash
        run: |
          ffmpeg -version
          ffprobe -version
          if [ "$RUNNER_OS" != "Windows" ]; then
            pkg-config --modversion libavcodec libavutil libavdevice \
              libavfilter libavformat libswresample libswscale || true
          fi

      - name: Bindgen diagnostics
        if: runner.os == 'Linux'
        run: |
          echo "LIBCLANG_PATH=$LIBCLANG_PATH"
          echo "CLANG_PATH=$CLANG_PATH"
          ldconfig -p | grep libclang || true
          dpkg -l | grep -E 'clang|llvm|libc6-dev|linux-libc-dev' || true

      - name: Prepare FFmpeg binding
        shell: bash
        run: |
          cargo fetch
          BINDING=$(find "$HOME/.cargo/registry/src" -path '*rusty_ffmpeg-*/src/binding.rs' 2>/dev/null | head -1)
          if [ "$RUNNER_OS" == "Windows" ]; then
            BINDING=$(cygpath -w "$BINDING")
          fi
          echo "FFMPEG_BINDING_PATH=$BINDING"
          echo "FFMPEG_BINDING_PATH=$BINDING" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            cargo build --all-targets --all-features --release --verbose
          else
            # Native V4L2/libcamera/RDK backends require Linux kernel headers.
            # On macOS/Windows test the full non-native feature set + rsmpeg instead.
            cargo build --all-targets \
              --features source-all,webui,net4mqtt,recorder,cascade,rsmpeg \
              --release --verbose
          fi
