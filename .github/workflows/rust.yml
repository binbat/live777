name: CI

on: [ push, pull_request ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-26.04 ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      # Same FFmpeg install method as the upstream rsmpeg repository.
      - name: Install LLVM and Clang (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: "10.0"
          directory: ${{ github.workspace }}/clang

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
          key: vcpkg-${{ runner.os }}

      - name: Build vcpkg (Windows)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg --depth 1
          ./vcpkg/bootstrap-vcpkg.bat

      - name: Install FFmpeg via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Enable the external codecs used by livetwo's rsmpeg sources:
          # VP8/VP9 (vpx), H264 (x264), H265 (x265), AV1 (svtav1), Opus (opus).
          ./vcpkg/vcpkg.exe install "ffmpeg[opus,svtav1,vpx,x264,x265]:x64-windows-static-md"

      - name: Expose vcpkg FFmpeg to rsmpeg (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VCPKG_ROOT=$(cygpath -w '${{ github.workspace }}/vcpkg')
          echo "VCPKG_ROOT=${VCPKG_ROOT}" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(cygpath -w '${{ github.workspace }}/clang/lib')" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$(cygpath -w '${{ github.workspace }}/clang/bin/llvm-config')" >> "$GITHUB_ENV"
          echo "FFMPEG_INCLUDE_DIR=$(cygpath -w '${{ github.workspace }}/vcpkg/installed/x64-windows-static-md/include')" >> "$GITHUB_ENV"
          echo "FFMPEG_LIBS_DIR=$(cygpath -w '${{ github.workspace }}/vcpkg/installed/x64-windows-static-md/lib')" >> "$GITHUB_ENV"
          echo "FFMPEG_LINK_MODE=static" >> "$GITHUB_ENV"
          echo "$(cygpath -w '${{ github.workspace }}/vcpkg/installed/x64-windows-static-md/tools/ffmpeg')" >> "$GITHUB_PATH"
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg pkg-config
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"
      - name: Install FFmpeg development files (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential pkg-config \
            ffmpeg libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev libavdevice-dev libavfilter-dev \
            libvpx-dev libx264-dev libx265-dev libsvtav1-dev libopus-dev
      - name: Show version information
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ffmpeg -version || true
            ffprobe -version || true
          else
            ffmpeg -version
            ffprobe -version
            pkg-config --modversion libavcodec libavutil libavdevice \
              libavfilter libavformat libswresample libswscale || true
          fi
      - name: Bindgen diagnostics
        if: runner.os == 'Linux'
        run: |
          echo "LIBCLANG_PATH=$LIBCLANG_PATH"
          echo "CLANG_PATH=$CLANG_PATH"
          ldconfig -p | grep libclang || true
          dpkg -l | grep -E 'clang|llvm|libc6-dev|linux-libc-dev' || true
      - name: Prepare FFmpeg binding
        shell: bash
        run: |
          cargo fetch
          BINDING=$(find "$HOME/.cargo/registry/src" -path '*rusty_ffmpeg-*/src/binding.rs' 2>/dev/null | head -1)
          if [ "$RUNNER_OS" == "Windows" ]; then
            BINDING=$(cygpath -w "$BINDING")
          fi
          echo "FFMPEG_BINDING_PATH=$BINDING"
          echo "FFMPEG_BINDING_PATH=$BINDING" >> "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm
      - name: Install npm dependencies
        run: pnpm install
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: .playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright
      - name: Build WebUI
        run: pnpm -r build
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Generate code coverage
        run: cargo llvm-cov nextest --profile ci --workspace --features source-all,webui,net4mqtt,recorder,cascade,rsmpeg,whepwright --lcov --output-path lcov.info
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright
      - name: Upload coverage to codecov.io
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-26.04 ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm
      - name: Install npm dependencies
        run: pnpm install
      - name: Build WebUI
        run: pnpm -r build
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg pkg-config
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcamera-dev libv4l-dev

      - name: Install FFmpeg development files (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential pkg-config \
            ffmpeg libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev libavdevice-dev libavfilter-dev \
            libvpx-dev libx264-dev libx265-dev libsvtav1-dev libopus-dev

      # Same FFmpeg install method as the upstream rsmpeg repository.
      - name: Install LLVM and Clang (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: "10.0"
          directory: ${{ github.workspace }}/clang

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
          key: vcpkg-${{ runner.os }}

      - name: Build vcpkg (Windows)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg --depth 1
          ./vcpkg/bootstrap-vcpkg.bat

      - name: Install FFmpeg via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Enable the external codecs used by livetwo's rsmpeg sources:
          # VP8/VP9 (vpx), H264 (x264), H265 (x265), AV1 (svtav1), Opus (opus).
          ./vcpkg/vcpkg.exe install "ffmpeg[opus,svtav1,vpx,x264,x265]:x64-windows-static-md"

      - name: Expose vcpkg FFmpeg to rsmpeg (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VCPKG_ROOT=$(cygpath -w '${{ github.workspace }}/vcpkg')
          echo "VCPKG_ROOT=${VCPKG_ROOT}" >> "$GITHUB_ENV"
          echo "LIBCLANG_PATH=$(cygpath -w '${{ github.workspace }}/clang/lib')" >> "$GITHUB_ENV"
          echo "LLVM_CONFIG_PATH=$(cygpath -w '${{ github.workspace }}/clang/bin/llvm-config')" >> "$GITHUB_ENV"
          echo "FFMPEG_INCLUDE_DIR=$(cygpath -w '${{ github.workspace }}/vcpkg/installed/x64-windows-static-md/include')" >> "$GITHUB_ENV"
          echo "FFMPEG_LIBS_DIR=$(cygpath -w '${{ github.workspace }}/vcpkg/installed/x64-windows-static-md/lib')" >> "$GITHUB_ENV"
          echo "FFMPEG_LINK_MODE=static" >> "$GITHUB_ENV"
          echo "$(cygpath -w '${{ github.workspace }}/vcpkg/installed/x64-windows-static-md/tools/ffmpeg')" >> "$GITHUB_PATH"

      - name: Show ffmpeg version
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ffmpeg -version || true
            ffprobe -version || true
          else
            ffmpeg -version
            ffprobe -version
            pkg-config --modversion libavcodec libavutil libavdevice \
              libavfilter libavformat libswresample libswscale || true
          fi

      - name: Bindgen diagnostics
        if: runner.os == 'Linux'
        run: |
          echo "LIBCLANG_PATH=$LIBCLANG_PATH"
          echo "CLANG_PATH=$CLANG_PATH"
          ldconfig -p | grep libclang || true
          dpkg -l | grep -E 'clang|llvm|libc6-dev|linux-libc-dev' || true

      - name: Prepare FFmpeg binding
        shell: bash
        run: |
          cargo fetch
          BINDING=$(find "$HOME/.cargo/registry/src" -path '*rusty_ffmpeg-*/src/binding.rs' 2>/dev/null | head -1)
          if [ "$RUNNER_OS" == "Windows" ]; then
            BINDING=$(cygpath -w "$BINDING")
          fi
          echo "FFMPEG_BINDING_PATH=$BINDING"
          echo "FFMPEG_BINDING_PATH=$BINDING" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            cargo build --all-targets --all-features --release --verbose
          else
            # Native V4L2/libcamera/RDK backends require Linux kernel headers.
            # On macOS/Windows test the full non-native feature set + rsmpeg + whepwright instead.
            cargo build --all-targets \
              --features source-all,webui,net4mqtt,recorder,cascade,rsmpeg,whepwright \
              --release --verbose
          fi
