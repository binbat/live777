name: CI

on: [ push, pull_request ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-26.04 ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install FFmpeg for rsmpeg
        uses: ./.github/actions/install-ffmpeg
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm
      - name: Install npm dependencies
        run: pnpm install
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: .playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright
      - name: Build WebUI
        run: pnpm -r build
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Generate code coverage
        run: cargo llvm-cov nextest --profile ci --workspace --features source-all,webui,net4mqtt,recorder,cascade,rsmpeg,whepwright --lcov --output-path lcov.info
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright
      - name: Upload coverage to codecov.io
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-26.04 ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm
      - name: Install npm dependencies
        run: pnpm install
      - name: Build WebUI
        run: pnpm -r build
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcamera-dev libv4l-dev
      - name: Install FFmpeg for rsmpeg
        uses: ./.github/actions/install-ffmpeg
      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            cargo build --all-targets --all-features --release --verbose
          else
            # Native V4L2/libcamera/RDK backends require Linux kernel headers.
            # On macOS/Windows test the full non-native feature set + rsmpeg + whepwright instead.
            cargo build --all-targets \
              --features source-all,webui,net4mqtt,recorder,cascade,rsmpeg,whepwright \
              --release --verbose
          fi
