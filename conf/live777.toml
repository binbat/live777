# Channel forwarding configuration.
# Each stream has one independent channel endpoint.
# URL format: udp://<listen_host>:<listen_port>?host=<target_host>&port=<target_port>
#   listen_host:listen_port  - liveion listens here for replies from downstream
#   target_host:target_port  - liveion sends DataChannel messages to this address
#
# [channel.streams.camera]
# url = "udp://0.0.0.0:7774?host=127.0.0.1&port=1234"
#
# [channel.streams.camera2]
# url = "udp://0.0.0.0:7775?host=127.0.0.1&port=1235"

[channel.streams.webcontrol]
url = "udp://0.0.0.0:8891?host=127.0.0.1&port=8890"

[http]
# Http Server Listen Address
# listen = "[::]:7777"
# Cross-Origin Resource Sharing (CORS)
# reference: https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS
cors = true

[[ice_servers]]
urls = [
    "stun:stun.l.google.com:19302",
]

[webrtc]
# UDP bind addresses used by WebRTC ICE host candidates.
# Env override priority: LIVE777_WEBRTC_ICE_UDP_ADDRS > LIVE777_WEBRTC_ICE_UDP_ADDR > LIVETWO_WEBRTC_ICE_UDP_ADDR > config > default.
# Use "auto" to advertise a non-loopback local address. Use "127.0.0.1:0" only when the browser runs on the same machine.
# 0.0.0.0 can bind sockets, but it is not a usable advertised ICE candidate address and will be ignored.
ice_udp_addrs = ["auto"]

[stream]

# ---- Path A: Legacy URL examples ----

# Need enabled `--features=source`
# [[stream.sources]]
# stream_id = "test-source"
# Need enabled `--features=source-sdp`
# - SDP file: file:///path/to/file.sdp or /path/to/file.sdp
# url = "file:///path/to/file.sdp"
# Need enabled `--features=source-rtsp`
# - RTSP: rtsp://username:password@host:port/path
# url = "rtsp://username:password@host:port/path"

# libcamera-bridge via legacy URL (requires --features=source-libcamera)
[[stream.sources]]
stream_id = "pi_cam"
url = "libcamera://0?width=640&height=480&fps=30"

# V4L2 via legacy URL (requires --features=source-v4l2)
# [[stream.sources]]
# stream_id = "usbcam_legacy"
# url = "v4l2:///dev/video0?width=640&height=480&fps=30&bitrate=1000000"

# ---- Path B: Structured native examples ----

# libcamera structured (requires --features=source-libcamera or native-rpi)
# [[stream.sources_v2]]
# stream_id = "pi_cam_v2"
# kind = "libcamera"
#
# [stream.sources_v2.capture]
# backend = "libcamera"
# device = "0"
# width = 640
# height = 480
# fps = 30
# pixel_format = "yuv420"
#
# [stream.sources_v2.encoder]
# backend = "v4l2-m2m"
# codec = "h264"
# bitrate = 1_000_000
# profile = "42001f"
# gop = 60
#
# [stream.sources_v2.output]
# payload_type = 96
# clock_rate = 90000

# V4L2 structured (requires --features=livesrc-v4l2,liveenc-v4l2-m2m or native-generic-v4l2)
# [[stream.sources_v2]]
# stream_id = "usbcam_v2"
# kind = "v4l2"
#
# [stream.sources_v2.capture]
# backend = "v4l2"
# device = "/dev/video0"
# width = 640
# height = 480
# fps = 30
# pixel_format = "yuyv"
#
# [stream.sources_v2.encoder]
# backend = "v4l2-m2m"
# codec = "h264"
# bitrate = 1_000_000
# profile = "42001f"
# gop = 60
#
# [stream.sources_v2.output]
# payload_type = 96
# clock_rate = 90000

# RDK X5 structured (requires --features=native-rdk or livesrc-v4l2,liveenc-rdk)
# Note: capture.backend = "v4l2" (RDK uses V4L2 capture), encoder.backend = "rdk".
# Legacy values "rdk-x5" / "rdk_x5" are still accepted.
# [[stream.sources_v2]]
# stream_id = "rdk_cam"
# kind = "v4l2"
#
# [stream.sources_v2.capture]
# backend = "v4l2"
# device = "/dev/video0"
# width = 1920
# height = 1080
# fps = 30
# pixel_format = "yuyv"
#
# [stream.sources_v2.encoder]
# backend = "rdk"
# codec = "h265"
# bitrate = 4_000_000
# profile = "42001f"
# gop = 60
#
# [stream.sources_v2.output]
# payload_type = 96
# clock_rate = 90000

[recorder]
# Stream name patterns for auto-recording, supports wildcards
# auto_streams = ["*"] # Record all streams
# Optional path for recorder index file (index.json)
# index_path = "./storage/index.json"
# Maximum duration in seconds before Live777 restarts a recording (0 disables auto-rotation)
# max_recording_seconds = 86400

# Async upload via Liveman presigned URLs
# [recorder.upload]
# enabled = false
# liveman_url = "http://127.0.0.1:8888"
# liveman_token = "live777"
# queue_path = "./recordings/upload_queue.jsonl"
# local_dir = "./recordings"
# presign_ttl_seconds = 300
# interval_ms = 2000
# concurrency = 2

# Storage backend configuration
[recorder.storage]
# Local filesystem (default)
type = "fs"
root = "./storage"

# AWS S3 with explicit credentials
#type = "s3"
#bucket = "my-live777-bucket"
#root = "/recordings"
#region = "us-east-1"
#access_key_id = "AKIAIOSFODNN7EXAMPLE"
#secret_access_key = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"

# AWS S3 with IAM role (recommended for EC2/ECS)
#type = "s3"
#bucket = "my-live777-bucket"
#root = "/recordings"
#region = "us-east-1"

# Optional: custom endpoint for S3-compatible storage
