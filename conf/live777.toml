[http]
# Http Server Listen Address
# listen = "[::]:7777"
# Cross-Origin Resource Sharing (CORS)
# reference: https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS
# cors = false

[[ice_servers]]
urls = [
    "stun:stun.l.google.com:19302",
]

[webrtc]
# UDP bind addresses used by WebRTC ICE host candidates.
# Env override priority: LIVE777_WEBRTC_ICE_UDP_ADDRS > LIVE777_WEBRTC_ICE_UDP_ADDR > LIVETWO_WEBRTC_ICE_UDP_ADDR > config > default.
# Use "auto" to advertise a non-loopback local address. Use "127.0.0.1:0" only when the browser runs on the same machine.
# 0.0.0.0 can bind sockets, but it is not a usable advertised ICE candidate address and will be ignored.
ice_udp_addrs = ["auto"]

[stream]

# [[stream.<name>]]

# Per-stream configuration. Each key under [stream] is a stream name and may
# contain sources (media inputs) and/or a channel (DataChannel <-> UDP bridge).
#
# Configured streams are "provisioned": they are registered at startup and
# always listed in the API/Dashboard (even while idle), are exempt from the
# automatic teardown strategies (orphan reaper, auto_delete_*), and cannot be
# created or deleted through the admin API (POST/DELETE return 409).
#
# Sources of a stream start unconditionally at startup by default. Set
# `on_demand = true` to start them only while the stream has subscribers
# (WHEP, cascade push, or RTSP pull) — the camera/encoder stays off until the
# first viewer arrives and stops again after the last one leaves:
#
# [stream.cam1]
# on_demand = true
# Grace period after the last subscriber leaves before sources stop (ms)
# on_demand_close_after_ms = 10000
# How long the first subscriber waits for the source to become ready (ms)
# before the subscribe request fails
# on_demand_start_timeout_ms = 10000
# [[stream.cam1.sources]]
# url = "rtsp://username:password@host:port/path"

# DataChannel <-> UDP forwarding for the "dc-udp" stream.
# [stream.dc-udp]
# [stream.dc-udp.channel]
# listen = "0.0.0.0:8891"
# target = "127.0.0.1:8890"

# Need enabled `--features=source`
# [stream.test-source]
# Need enabled `--features=source-sdp`
# - SDP file: file:///path/to/file.sdp or /path/to/file.sdp
# [[stream.test-source.sources]]
# url = "file:///path/to/file.sdp"
# Need enabled `--features=source-rtsp`
# - RTSP: rtsp://username:password@host:port/path
# [[stream.test-source.sources]]
# url = "rtsp://username:password@host:port/path"

# --- Native source examples (structured config, recommended) ---
#
# Raspberry Pi CSI camera:
#   cargo build --bin live777 --release \
#     --no-default-features --features native-rpi,webui
# Or:
#   cargo build --bin live777 --release \
#     --no-default-features --features webui,capture-libcamera,encoder-v4l2-m2m
#
# [stream.pi-cam]
# [[stream.pi-cam.sources]]
# [stream.pi-cam.sources.capture]
# backend = "libcamera"
# device = "0"
# width = 640
# height = 480
# fps = 30
# pixel_format = "yuv420"
# [stream.pi-cam.sources.encoder]
# backend = "v4l2-m2m"
# codec = "h264"
# bitrate = 1000000
# profile = "baseline"        # or a 6-digit hex profile-level-id like "42001f"
# level = "3.1"               # required when profile is a name
# gop = 60
# [stream.pi-cam.sources.output]
# payload_type = 96
# clock_rate = 90000
#
# Raspberry Pi USB camera:
#   cargo build --bin live777 --release --no-default-features --features native-rpi,webui
# Or:
#   cargo build --bin live777 --release \
#     --no-default-features --features webui,capture-v4l2,encoder-v4l2-m2m
#
# [stream.usb-cam]
# [[stream.usb-cam.sources]]
# [stream.usb-cam.sources.capture]
# backend = "v4l2"
# device = "/dev/video2"
# width = 640
# height = 480
# fps = 30
# pixel_format = "yuyv"
# [stream.usb-cam.sources.encoder]
# backend = "v4l2-m2m"
# codec = "h264"
# bitrate = 1000000
# profile = "42001f"          # 6-digit hex profile-level-id
# gop = 60
# [stream.usb-cam.sources.output]
# payload_type = 96
# clock_rate = 90000
#
# RDK X5 V4L2 camera + RDK hardware encoder:
#   cargo build --bin live777 --release \
#     --no-default-features --features native-rdk,webui
#
# [stream.rdk-cam]
# [[stream.rdk-cam.sources]]
# [stream.rdk-cam.sources.capture]
# backend = "v4l2"
# device = "/dev/video0"
# width = 640
# height = 480
# fps = 30
# pixel_format = "yuyv"
# [stream.rdk-cam.sources.encoder]
# backend = "rdk"
# codec = "h264"
# bitrate = 1000000
# profile = "42001f"
# gop = 60
# [stream.rdk-cam.sources.output]
# payload_type = 96
# clock_rate = 90000

[recorder]
# Stream name patterns for auto-recording, supports wildcards
# auto_streams = ["*"] # Record all streams
# Optional path for recorder index file (index.json)
# index_path = "./storage/index.json"
# Maximum duration in seconds before Live777 restarts a recording (0 disables auto-rotation)
# max_recording_seconds = 86400

# Async upload via Liveman presigned URLs
# [recorder.upload]
# enabled = false
# liveman_url = "http://127.0.0.1:8888"
# liveman_token = "live777"
# queue_path = "./recordings/upload_queue.jsonl"
# local_dir = "./recordings"
# presign_ttl_seconds = 300
# interval_ms = 2000
# concurrency = 2

# Storage backend configuration
[recorder.storage]
# Local filesystem (default)
type = "fs"
root = "./storage"

# AWS S3 with explicit credentials
#type = "s3"
#bucket = "my-live777-bucket"
#root = "/recordings"
#region = "us-east-1"
#access_key_id = "AKIAIOSFODNN7EXAMPLE"
#secret_access_key = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"

# AWS S3 with IAM role (recommended for EC2/ECS)
#type = "s3"
#bucket = "my-live777-bucket"
#root = "/recordings"
#region = "us-east-1"

# Optional: custom endpoint for S3-compatible storage
#endpoint = "http://localhost:9000"

# [[ice_servers]]
# urls = [ "turn:turn.22333.fun", "turn:cn.22333.fun" ]
# username = "live777"
# credential = "live777"

# WHIP/WHEP auth token
# Headers["Authorization"] = "Bearer {token}"
# [auth]
# JSON WEB TOKEN secret
# secret = "<jwt_secret>"
# static JWT token, superadmin, debuggger can use this token
# tokens = ["live777"]

[log]
# Env: `LOG_LEVEL`
# Default: info
# Values: off, error, warn, info, debug, trace
# level = "warn"

[sdp]
# Disable codecs in SDP negotiation (useful for recorder-only pipelines)
# Available: VP8, VP9, H264, H265, AV1, OPUS, G722, PCMU, PCMA
# disable_codecs = ["VP8", "H264"]

[strategy]
# If not set, use default u16::MAX
# Default: 65535
# each_stream_max_sub = 1
# If cascade push is beginning, close all subscriber
# cascade_push_close_sub = false

# WHIP auto a stream
# auto_create_whip = true
# WHEP auto a stream
# auto_create_whep = true
#
# Default: -1
# -1: disable
# 0: immediately destroy
# >= 1: delay millisecond
# Auto a destroy a stream at no pub
# auto_delete_whip = 60000
# Auto a destroy a stream at no sub
# auto_delete_whep = 60000

# Per-stream strategy overrides take precedence over the global [strategy] section.
# [stream.restricted]
# [stream.restricted.strategy]
# auto_create_whip = false
# auto_create_whep = false

# Stream-lifecycle hooks: run scripts when streams are created/deleted.
# Scripts receive `<event> <stream> [reason]` as argv and the same values as
# LIVE777_EVENT / LIVE777_STREAM / LIVE777_REASON. Hooks of one event run in
# order (global first, then per-stream); events are processed strictly FIFO.
# [hooks]
# Per-script timeout in milliseconds (0 disables)
# timeout_ms = 5000
# "stop": skip the remaining hooks of the same event on failure
# on_error = "stop"
# on_stream_created = ["/etc/live777/hooks/created.sh"]
# on_stream_deleted = ["/etc/live777/hooks/deleted.sh"]

# Per-stream hooks run after the global [hooks] ones.
# [stream.cam1.hooks]
# on_stream_created = ["/etc/live777/hooks/cam1-created.sh"]
# on_stream_deleted = ["/etc/live777/hooks/cam1-deleted.sh"]

# Default enabled `--features=net4mqtt`
# [net4mqtt]
# Global unique alias
# alias = "liveion-0"
# `client_id={alias}` use alias as MQTT `client_id`
# mqtt_url = "mqtt://localhost:1883/net4mqtt?client_id={alias}"

# Default disabled `--features=rtsp`
# [rtsp]
# RTSP server listen URL.  The same port handles push (ANNOUNCE/RECORD) and
# pull (DESCRIBE/PLAY) sessions.  When credentials are present in the URL,
# Digest authentication is enabled automatically.
#
# No auth:            listen = "0.0.0.0:8554"
# With auth:          listen = "rtsp://admin:secret@0.0.0.0:8554"
# listen = "0.0.0.0:8554"
# realm = "live777"
