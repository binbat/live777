# Live777 最终对齐版配置文件 (修正字段名为 stream_id)

[http]
listen = "0.0.0.0:7777"

[log]
level = "debug"

# 严格匹配 liveion/src/config.rs 中的构造
[stream]
[[stream.sources]]
stream_id = "camera"
url = "libcamera://0?width=640&height=480&fps=30"

# 同时保留原有的 paths 结构以确保万一
[paths.camera]
source = "libcamera"
source_on_demand = false
rtp_port = 5004

[paths.camera.libcamera]
width = 640
height = 480
fps = 30
camera_id = 0
