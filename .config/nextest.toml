[test-groups]
resource-limited = { max-threads = 4 }
serial-integration = { max-threads = 1 }

[profile.default]
retries = { backoff = "exponential", count = 4, delay = "5s", jitter = true }

# Unit tests and lib tests run with limited parallelism.
[[profile.default.overrides]]
filter = 'not (binary(rtp) | binary(rtsp) | binary(rtsp2) | binary(channel) | binary(tests))'
test-group = 'resource-limited'

# Integration test binaries exercise ffmpeg and local sockets; keep them serial
# to avoid fixed-port and media-resource contention under nextest.
[[profile.default.overrides]]
filter = 'binary(rtp) | binary(rtsp) | binary(rtsp2) | binary(channel) | binary(tests)'
test-group = 'serial-integration'
